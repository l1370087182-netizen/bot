<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Bot v10.0 - 交易监控面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header .version { opacity: 0.8; font-size: 14px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3561;
        }
        .card h3 {
            color: #8892b0;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
        }
        .card .change {
            font-size: 14px;
            margin-top: 5px;
        }
        .positive { color: #00d084; }
        .negative { color: #ff4757; }
        .warning { color: #ffa502; }
        
        .status-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            background: #1a1f3a;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #2d3561;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00d084;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .positions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .positions-table th,
        .positions-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3561;
        }
        .positions-table th {
            color: #8892b0;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-long { background: rgba(0, 208, 132, 0.2); color: #00d084; }
        .badge-short { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .badge-premium { background: rgba(102, 126, 234, 0.2); color: #667eea; }
        .badge-high-risk { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        
        .trades-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #2d3561;
            align-items: center;
        }
        .trade-item:last-child { border-bottom: none; }
        .trade-symbol { font-weight: 500; }
        .trade-pnl { font-weight: bold; }
        
        .alert-box {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-box.show { display: block; }
        .alert-box h4 { color: #ff4757; margin-bottom: 5px; }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .refresh-btn:hover { background: #5a67d8; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Binance Trading Bot</h1>
        <div class="version">v10.0 - 三层防护 + 放大器架构</div>
    </div>
    
    <div id="alertBox" class="alert-box">
        <h4>⚠️ 风控警报</h4>
        <p id="alertMessage"></p>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <div class="status-dot"></div>
            <span>系统运行中</span>
        </div>
        <div class="status-item">
            <span>🛡️ 风控: </span>
            <span id="riskStatus" class="positive">正常</span>
        </div>
        <div class="status-item">
            <span>📊 模式: </span>
            <span id="modeStatus">v10.0 完整防护</span>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>💰 账户余额</h3>
            <div class="value" id="balance">--</div>
            <div class="change" id="balanceChange">--</div>
        </div>
        
        <div class="card">
            <h3>📈 今日盈亏</h3>
            <div class="value" id="dailyPnl">--</div>
            <div class="change" id="dailyPnlPct">--</div>
        </div>
        
        <div class="card">
            <h3>🎯 胜率 (30天)</h3>
            <div class="value" id="winRate">--</div>
            <div class="change" id="tradeStats">--</div>
        </div>
        
        <div class="card">
            <h3>💎 净利润 (30天)</h3>
            <div class="value" id="netPnl">--</div>
            <div class="change" id="totalTrades">--</div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card" style="grid-column: 1 / -1;">
            <h3>📊 当前持仓</h3>
            <table class="positions-table">
                <thead>
                    <tr>
                        <th>币种</th>
                        <th>方向</th>
                        <th>数量</th>
                        <th>入场价</th>
                        <th>标记价</th>
                        <th>盈亏</th>
                        <th>杠杆</th>
                        <th>强平价</th>
                        <th>等级</th>
                    </tr>
                </thead>
                <tbody id="positionsBody">
                    <tr><td colspan="9" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>📝 最近交易</h3>
            <div class="trades-list" id="tradesList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="card">
            <h3>🛡️ 风控状态</h3>
            <div id="protectionStatus">
                <div class="status-item" style="margin-bottom: 10px;">
                    <span>日亏损限制 (5%):</span>
                    <span class="positive" id="dailyLossStatus">正常</span>
                </div>
                <div class="status-item" style="margin-bottom: 10px;">
                    <span>回撤保护 (7%):</span>
                    <span class="positive" id="drawdownStatus1">正常</span>
                </div>
                <div class="status-item">
                    <span>硬止损 (10%):</span>
                    <span class="positive" id="drawdownStatus2">正常</span>
                </div>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
    
    <script>
        let refreshInterval;
        
        async function fetchData() {
            try {
                const response = await fetch('/api/summary');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }
        
        function updateUI(data) {
            // 更新余额
            const status = data.status || {};
            document.getElementById('balance').textContent = 
                (status.balance || 0).toFixed(2) + ' USDT';
            
            // 更新性能指标
            const perf = data.performance || {};
            document.getElementById('winRate').textContent = 
                (perf.win_rate || 0) + '%';
            document.getElementById('tradeStats').textContent = 
                `盈利 ${perf.winning_trades || 0} / 亏损 ${perf.losing_trades || 0}`;
            document.getElementById('netPnl').textContent = 
                (perf.net_pnl || 0).toFixed(2) + ' USDT';
            document.getElementById('totalTrades').textContent = 
                `总交易 ${perf.total_trades || 0} 笔`;
            
            // 更新持仓
            updatePositions(data.positions || []);
            
            // 更新最近交易
            updateTrades(perf.recent_trades || []);
            
            // 更新风控状态
            updateProtection(data.protection || {});
        }
        
        function updatePositions(positions) {
            const tbody = document.getElementById('positionsBody');
            if (positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#8892b0;">无持仓</td></tr>';
                return;
            }
            
            tbody.innerHTML = positions.map(p => `
                <tr>
                    <td><strong>${p.symbol}</strong></td>
                    <td><span class="badge badge-${p.side.toLowerCase()}">${p.side}</span></td>
                    <td>${p.size.toFixed(4)}</td>
                    <td>${p.entry_price.toFixed(2)}</td>
                    <td>${p.mark_price.toFixed(2)}</td>
                    <td class="${p.pnl >= 0 ? 'positive' : 'negative'}">
                        ${p.pnl >= 0 ? '+' : ''}${p.pnl.toFixed(2)} (${p.pnl_pct.toFixed(2)}%)
                    </td>
                    <td>${p.leverage}x</td>
                    <td>${p.liquidation_price ? p.liquidation_price.toFixed(2) : '--'}</td>
                    <td><span class="badge badge-${p.tier.toLowerCase()}">${p.tier}</span></td>
                </tr>
            `).join('');
        }
        
        function updateTrades(trades) {
            const list = document.getElementById('tradesList');
            if (trades.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:#8892b0;padding:20px;">无交易记录</div>';
                return;
            }
            
            list.innerHTML = trades.map(t => `
                <div class="trade-item">
                    <div>
                        <div class="trade-symbol">${t.symbol} <span class="badge badge-${t.side.toLowerCase()}">${t.side}</span></div>
                        <div style="color:#8892b0;font-size:12px;">${new Date(t.time).toLocaleString()}</div>
                    </div>
                    <div class="trade-pnl ${t.pnl >= 0 ? 'positive' : 'negative'}">
                        ${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(2)} USDT
                    </div>
                </div>
            `).join('');
        }
        
        function updateProtection(protection) {
            // 更新风控状态显示
            if (protection.daily_loss_triggered) {
                document.getElementById('dailyLossStatus').textContent = '已触发';
                document.getElementById('dailyLossStatus').className = 'negative';
            }
            if (protection.survival_mode) {
                document.getElementById('drawdownStatus1').textContent = '保命模式';
                document.getElementById('drawdownStatus1').className = 'warning';
                document.getElementById('riskStatus').textContent = '保命模式';
                document.getElementById('riskStatus').className = 'warning';
            }
            if (protection.account_locked) {
                document.getElementById('drawdownStatus2').textContent = '已锁定';
                document.getElementById('drawdownStatus2').className = 'negative';
                document.getElementById('riskStatus').textContent = '账户锁定';
                document.getElementById('riskStatus').className = 'negative';
                
                document.getElementById('alertBox').classList.add('show');
                document.getElementById('alertMessage').textContent = 
                    '账户因回撤过大已被锁定，请检查交易日志并手动解锁。';
            }
        }
        
        function refreshData() {
            fetchData();
        }
        
        // 初始加载
        fetchData();
        
        // 每5秒自动刷新
        refreshInterval = setInterval(fetchData, 5000);
    </script>
</body>
</html>
