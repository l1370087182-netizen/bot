<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>币安交易机器人 v2.1</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0e17; --card-bg: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #fff; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { padding: 40px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        h1 { font-size: 2.5em; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .status-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .status-label { color: #888; font-size: 0.9em; margin-bottom: 5px; }
        .status-value { font-size: 1.4em; font-weight: bold; }
        .online { color: #00ff88; } .offline { color: #ff4444; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { margin-bottom: 20px; font-size: 1.2em; display: flex; align-items: center; gap: 10px; }
        .card h2::before { content: ''; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-red { background: #ff4444; color: #fff; }
        .btn-blue { background: #00d4ff; color: #000; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        
        .pos-card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00d4ff; }
        .pos-card.LONG { border-left-color: #00ff88; }
        .pos-card.SHORT { border-left-color: #ff4444; }
        .pos-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85em; color: #aaa; }
        .pos-val { color: #fff; font-weight: 500; }
        .pos-pnl { font-size: 1.2em; font-weight: bold; margin-top: 10px; text-align: right; }
        
        .log-box { background: #000; border-radius: 8px; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; font-size: 0.8em; color: #00d4ff; }
        
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }

        @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 BINANCE BOT DASHBOARD</h1>
            <p style="color:#666">智能高频交易系统 v2.1 (强制刷新: Ctrl+F5)</p>
        </header>

        <div class="status-grid">
            <div class="status-box">
                <div class="status-label">核心状态</div>
                <div id="botStatus" class="status-value offline">未连接</div>
            </div>
            <div class="status-box">
                <div class="status-label">运行时间</div>
                <div id="uptime" class="status-value">-</div>
            </div>
            <div class="status-box">
                <div class="status-label">账户余额</div>
                <div id="balance" class="status-value">0.00 USDT</div>
            </div>
            <div class="status-box">
                <div class="status-label">活跃仓位</div>
                <div id="posCount" class="status-value">0</div>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>系统控制</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-green" onclick="botAction('start')">▶ 启动</button>
                    <button class="btn btn-red" onclick="botAction('stop')">⏹ 停止</button>
                    <button class="btn btn-blue" onclick="botAction('restart')">🔄 重启</button>
                </div>
                <div class="form-group">
                    <label>币安 API 绑定 IP (用于交易)</label>
                    <input type="text" id="binanceIP" value="" placeholder="例如: 203.0.113.1">
                    <small style="color:#666">修改后需到币安官网绑定此IP才能交易</small>
                </div>
                <div class="form-group">
                    <label>Web 管理 IP</label>
                    <input type="text" id="serverIP" value="127.0.0.1" placeholder="例如: 192.168.1.100">
                </div>
                <div class="form-group">
                    <label>管理端口</label>
                    <input type="number" id="apiPort" value="8080">
                </div>
                <button class="btn btn-blue" style="width:100%" onclick="saveCfg()">💾 保存并验证配置</button>
            </div>

            <div class="card">
                <h2>实时持仓 <span style="font-size:0.6em;color:var(--primary);margin-left:auto">LIVE更新</span></h2>
                <div id="posList">
                    <p style="color:#444;text-align:center;padding:40px;">暂无持仓</p>
                </div>
            </div>

            <div class="card" style="grid-column: 1 / -1">
                <h2>运行日志</h2>
                <div id="logs" class="log-box"></div>
                <div style="margin-top:10px">
                    <button class="btn btn-blue" onclick="fetchLogs()">手动刷新日志</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', () => {
            document.getElementById('botStatus').innerText = '● 已连接';
            document.getElementById('botStatus').className = 'status-value online';
        });

        socket.on('status_update', (data) => {
            if(data.running) {
                document.getElementById('botStatus').innerText = '● 运行中';
                document.getElementById('botStatus').className = 'status-value online';
            } else {
                document.getElementById('botStatus').innerText = '● 已停止';
                document.getElementById('botStatus').className = 'status-value offline';
            }
            document.getElementById('uptime').innerText = data.uptime;
            document.getElementById('balance').innerText = data.balance + ' USDT';
        });

        socket.on('positions_update', (data) => {
            document.getElementById('posCount').innerText = data.count;
            const list = document.getElementById('posList');
            if(data.count === 0) {
                list.innerHTML = '<p style="color:#444;text-align:center;padding:40px;">暂无持仓</p>';
                return;
            }
            list.innerHTML = data.positions.map(p => `
                <div class="pos-card ${p.side}">
                    <div class="pos-header">
                        <span style="font-weight:bold">${p.symbol}</span>
                        <span style="color:${p.side==='LONG'?'#00ff88':'#ff4444'}">${p.side} ${p.leverage}x</span>
                    </div>
                    <div class="pos-grid">
                        <div>数量: <span class="pos-val">${p.size}</span></div>
                        <div>开仓价: <span class="pos-val">$${p.entry_price}</span></div>
                        <div>当前价: <span class="pos-val">$${p.mark_price}</span></div>
                        <div>保证金: <span class="pos-val">$${p.margin}</span></div>
                    </div>
                    <div class="pos-pnl ${p.pnl_pct>=0?'online':'offline'}">
                        ${p.pnl_pct>=0?'+':''}${p.pnl_pct.toFixed(2)}% (${p.unrealized_pnl.toFixed(2)} USDT)
                    </div>
                    <div style="font-size:0.7em;color:#444;margin-top:5px">强平价: $${p.liquidation_price}</div>
                </div>
            `).join('');
        });

        function botAction(act) {
            fetch('/api/bot/'+act, {method:'POST'})
                .then(r => r.json())
                .then(d => alert(d.message || '操作成功'));
        }

        function saveCfg() {
            const binanceIP = document.getElementById('binanceIP').value.trim();
            const serverIP = document.getElementById('serverIP').value.trim();
            const port = document.getElementById('apiPort').value;
            
            // 简单 IP 验证
            const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (serverIP && !ipRegex.test(serverIP)) {
                alert('Web 管理 IP 格式不正确！');
                return;
            }
            if (binanceIP && !ipRegex.test(binanceIP)) {
                alert('币安 API IP 格式不正确！');
                return;
            }
            
            const config = {server_ip: serverIP, api_port: parseInt(port)};
            if (binanceIP) config.binance_ip = binanceIP;
            
            fetch('/api/config', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(config)
            }).then(r => r.json()).then(d => {
                if(d.success) {
                    let msg = '配置已保存！';
                    if (binanceIP) msg += '\n\n⚠️ 重要：请到币安官网将此IP添加到API密钥的IP白名单中！';
                    alert(msg);
                }
                else alert('保存失败: ' + (d.message || '未知错误'));
            });
        }

        function fetchLogs() {
            fetch('/api/logs').then(r => r.text()).then(t => {
                const box = document.getElementById('logs');
                box.innerText = t;
                box.scrollTop = box.scrollHeight;
            });
        }

        setInterval(fetchLogs, 10000);
        fetchLogs();
        fetch('/api/config').then(r=>r.json()).then(d=>{
            document.getElementById('binanceIP').value = d.binance_ip || '';
            document.getElementById('serverIP').value = d.server_ip || '127.0.0.1';
            document.getElementById('apiPort').value = d.api_port || 8080;
        });
    </script>
</body>
</html>
